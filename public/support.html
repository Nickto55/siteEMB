<!DOCTYPE html>

<html class="scroll-smooth" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Техническая помощь - EmbroMine</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: {
                            black: '#0a0810',
                            dark: '#120a1a',
                        },
                        purple: {
                            deep: '#6D28D9',
                            royal: '#8B5CF6',
                            neon: '#A855F7',
                            soft: '#C4B5FD',
                        },
                        magenta: {
                            glow: '#D946EF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
<style>
        /* FAQ toggle transition */
        #faq-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.4s ease, margin 0.4s ease;
            opacity: 0;
        }
        #faq-container.open {
            max-height: 2000px;
            opacity: 1;
        }

        /* Modal overlay */
        .modal-overlay {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-content {
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body class="bg-void-black text-white font-sans antialiased overflow-x-hidden">
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0" id="particles"></div>
<!-- Navigation -->
<script defer="" src="/js/header.js"></script>
<main class="min-h-screen pt-24 pb-16 px-4 sm:px-6 lg:px-8 relative z-10"><div class="min-h-[50vh] flex items-center justify-center transition-opacity duration-300 opacity-0" data-page-content="true" id="dynamic-content">
<div class="text-center">
<div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-white/50"></div>
<p class="mt-2 text-gray-400 text-sm">Загрузка контента...</p>
</div>
</div></main>
<!-- FAQ Modal -->
<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" id="faq-modal">
<div class="modal-content bg-void-dark border border-purple-soft/20 rounded-2xl max-w-lg w-full p-8 relative shadow-2xl shadow-purple-deep/20">
<button class="absolute top-4 right-4 text-purple-soft/60 hover:text-white transition-colors" id="modal-close">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h3 class="text-2xl font-bold text-purple-soft pr-8 mb-4" id="modal-title"></h3>
<div class="text-purple-soft/80 leading-relaxed text-base" id="modal-body"></div>
</div>
</div>
<footer class="bg-void-dark border-t border-purple-soft/10 py-12 relative z-10">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="border-t border-purple-soft/10 pt-8">
<p class="text-purple-soft/40 text-sm text-center">© 2026 EmbroMine. Not affiliated with Mojang Studios.
                </p>
</div>
</div>
</footer>
<script src="script.js"></script>

<script defer="" src="content-manager.js"></script></body>
</html>
