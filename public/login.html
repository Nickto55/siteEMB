<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - EmbroMine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: {
                            black: '#0a0810',
                            dark: '#120a1a',
                        },
                        purple: {
                            deep: '#6D28D9',
                            royal: '#8B5CF6',
                            neon: '#A855F7',
                            soft: '#C4B5FD',
                        },
                        magenta: {
                            glow: '#D946EF',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-void-black text-white font-sans antialiased overflow-x-hidden">
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0" id="particles"></div>
    <!-- Navigation -->
    <script src="/js/header.js" defer></script>

    <!-- Auth Container -->
    <div class="min-h-screen flex items-center justify-center pt-20 px-4 sm:px-6 lg:px-8 relative z-10">
        <div
            class="max-w-md w-full bg-void-dark/90 backdrop-blur-xl border border-purple-soft/10 rounded-2xl p-8 shadow-2xl">
            <!-- Tabs -->
            <div class="flex gap-4 mb-8 border-b border-purple-soft/10 pb-4">
                <button class="tab-btn active flex-1 text-center" onclick="switchTab('login'); return false;">
                    Вход
                </button>
                <button class="tab-btn flex-1 text-center" onclick="switchTab('register'); return false;">
                    Регистрация
                </button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event); return false;">
                <h2 class="text-2xl font-bold mb-6 text-center">Вход в систему</h2>

                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" class="auth-input" placeholder="Введите имя пользователя"
                        required autocomplete="username">
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="auth-input" placeholder="Введите пароль"
                        required autocomplete="current-password">
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-deep to-purple-neon hover:from-purple-royal hover:to-purple-soft text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-purple-deep/25 mt-4">
                    Войти
                </button>

                <div id="login-message" style="margin-top: 16px;"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event); return false;">
                <h2 class="text-2xl font-bold mb-6 text-center">Регистрация</h2>

                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" class="auth-input" placeholder="Выберите имя пользователя"
                        minlength="3" maxlength="30" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="auth-input" placeholder="Введите ваш email"
                        required autocomplete="email">
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="auth-input" placeholder="Придумайте надежный пароль"
                        minlength="6" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" name="password_confirm" class="auth-input" placeholder="Повторите пароль"
                        minlength="6" required autocomplete="new-password">
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-deep to-purple-neon hover:from-purple-royal hover:to-purple-soft text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-purple-deep/25 mt-4">
                    Зарегистрироваться
                </button>

                <div id="register-message" style="margin-top: 16px;"></div>
            </form>

            <div class="mt-6 pt-6 border-t border-purple-soft/10">
                <p class="text-center text-purple-soft/60 text-sm">
                    Нет аккаунта? <a href="#" onclick="switchTab('register'); return false;"
                        class="text-purple-soft hover:text-purple-neon transition-colors font-semibold">Зарегистрируйся</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="w-full bg-void-black border-t border-purple-soft/10 py-6 text-center text-purple-soft/40 text-sm relative z-10">
        <p>© 2026 EmbroMine. Not affiliated with Mojang Studios.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
