<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - EmbroMine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mc: {
                            dark: '#1a1a1a',
                            darker: '#0f0f0f',
                            green: '#5D8C30',
                            greenLight: '#7EB342'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body id="admin-panel" class="bg-mc-darker text-white font-sans antialiased overflow-x-hidden">
    <!-- Floating Particles Background -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0" id="particles"></div>

    <script src="/js/header.js" defer></script>

    <!-- Main Content -->
    <div class="min-h-screen pt-20 pb-16 px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <h1
                    class="text-3xl md:text-5xl font-bold bg-gradient-to-r from-white to-mc-greenLight bg-clip-text text-transparent">
                    Панель администратора
                </h1>
                <span id="admin-user" class="text-sm text-gray-400"></span>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 mb-8 border-b border-white/10 pb-4 flex-wrap">
                <button class="tab-btn active" data-admin-tab="users">👥 Пользователи</button>
                <button class="tab-btn" data-admin-tab="reports">📋 Отчеты</button>
                <button class="tab-btn" data-admin-tab="tickets">🎫 Тикеты</button>
                <button class="tab-btn" data-admin-tab="settings">⚙️ Настройки</button>
            </div>

            <!-- Users Tab -->
            <div id="users-tab" class="block">
                <div class="dashboard-card mb-6">
                    <h2 class="text-2xl font-bold mb-6">Управление пользователями</h2>

                    <div class="mb-6">
                        <input type="text" id="search-users" placeholder="Поиск пользователя..." class="auth-input"
                            style="margin-bottom: 0;">
                    </div>

                    <div id="users-list" class="space-y-4">
                        <div class="p-4 bg-white/5 rounded-lg text-center text-gray-400">
                            Загрузка пользователей...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reports Tab -->
            <div id="reports-tab" class="block hidden">
                <div class="dashboard-card mb-6">
                    <h2 class="text-2xl font-bold mb-6">Управление отчетами</h2>

                    <div class="mb-6">
                        <select id="status-filter" class="auth-input" style="margin-bottom: 0;">
                            <option value="">Все статусы</option>
                            <option value="pending">Ожидающие</option>
                            <option value="in_progress">В процессе</option>
                            <option value="resolved">Разрешены</option>
                            <option value="closed">Закрыты</option>
                        </select>
                    </div>

                    <div id="reports-list" class="space-y-4">
                        <div class="p-4 bg-white/5 rounded-lg text-center text-gray-400">
                            Загрузка отчетов...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tickets Tab -->
            <div id="tickets-tab" class="block hidden">
                <div class="dashboard-card mb-6">
                    <h2 class="text-2xl font-bold mb-6">Управление тикетами</h2>

                    <div class="flex gap-4 mb-6 flex-wrap">
                        <select id="ticket-status-filter" class="auth-input" style="margin-bottom: 0; width: auto;">
                            <option value="">Все статусы</option>
                            <option value="open">Открытые</option>
                            <option value="in_progress">В процессе</option>
                            <option value="resolved">Решенные</option>
                            <option value="closed">Закрытые</option>
                        </select>
                        <input type="text" id="ticket-search" placeholder="Поиск по нику или теме..." class="auth-input" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                    </div>

                    <div id="tickets-list" class="space-y-4">
                        <div class="p-4 bg-white/5 rounded-lg text-center text-gray-400">
                            Загрузка тикетов...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="settings-tab" class="block hidden">
                <div class="dashboard-card mb-6">
                    <h2 class="text-2xl font-bold mb-6">Настройки сервера</h2>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-gray-400 text-sm mb-2">Версия Minecraft</label>
                            <input type="text" value="1.20.1" class="auth-input bg-white/5" style="margin-bottom: 0;">
                        </div>

                        <div>
                            <label class="block text-gray-400 text-sm mb-2">IP адрес сервера</label>
                            <input type="text" value="play.embromine.ru" readonly class="auth-input bg-white/5"
                                style="margin-bottom: 0;">
                        </div>

                        <div>
                            <label class="block text-gray-400 text-sm mb-2">Максимум игроков</label>
                            <input type="number" value="50" min="1" class="auth-input" style="margin-bottom: 0;">
                        </div>

                        <div>
                            <label class="block text-gray-400 text-sm mb-2">Описание сервера</label>
                            <textarea class="auth-input"
                                style="min-height: 100px; margin-bottom: 0;">Minecraft сервер для спонсоров</textarea>
                        </div>

                        <button
                            class="w-full bg-gradient-to-r from-mc-green to-mc-greenLight hover:from-mc-greenLight hover:to-mc-green text-white font-bold py-3 rounded-lg transition-all">
                            Сохранить настройки
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchAdminTab(tab, clickedBtn) {
            document.querySelectorAll('[id$="-tab"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + '-tab').classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (clickedBtn) clickedBtn.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof requireAdmin === 'function') {
                requireAdmin();
            }
            checkAdminAccess();
            loadTickets();
            loadUsers();
            loadReports();

            document.querySelectorAll('[data-admin-tab]').forEach(btn => {
                btn.addEventListener('click', () => switchAdminTab(btn.dataset.adminTab, btn));
            });

            document.getElementById('ticket-status-filter')?.addEventListener('change', loadTickets);
            document.getElementById('ticket-search')?.addEventListener('input', debounce(loadTickets, 300));
        });

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Tickets management
        async function loadTickets() {
            const container = document.getElementById('tickets-list');
            if (!container) return;

            const token = localStorage.getItem('token');
            const status = document.getElementById('ticket-status-filter')?.value || '';
            const search = document.getElementById('ticket-search')?.value || '';

            let url = '/api/tickets';
            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (search) params.append('search', search);
            if (params.toString()) url += '?' + params.toString();

            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!response.ok) {
                    container.innerHTML = `<div class="p-4 bg-white/5 rounded-lg text-center text-red-400">Ошибка загрузки тикетов</div>`;
                    return;
                }

                const data = await response.json();

                if (data.tickets.length === 0) {
                    container.innerHTML = `<div class="p-4 bg-white/5 rounded-lg text-center text-gray-400">Тикетов не найдено</div>`;
                    return;
                }

                container.innerHTML = data.tickets.map(ticket => `
                    <div class="bg-white/5 rounded-lg p-4 hover:bg-white/10 transition-colors">
                        <div class="flex items-start justify-between gap-4 flex-wrap">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1 flex-wrap">
                                    <span class="font-bold text-white">#${ticket.id}</span>
                                    <span class="px-2 py-0.5 rounded text-xs font-medium ${getStatusClass(ticket.status)}">${getStatusLabel(ticket.status)}</span>
                                    <span class="px-2 py-0.5 rounded text-xs font-medium ${getPriorityClass(ticket.priority)}">${getPriorityLabel(ticket.priority)}</span>
                                </div>
                                <h3 class="font-semibold text-white truncate">${escapeHtml(ticket.subject)}</h3>
                                <p class="text-gray-400 text-sm mt-1">${escapeHtml(ticket.username)} • ${escapeHtml(ticket.category)} • ${formatDate(ticket.created_at)}</p>
                                <p class="text-gray-300 text-sm mt-2 line-clamp-2">${escapeHtml(ticket.description)}</p>
                                ${ticket.email ? `<p class="text-gray-500 text-xs mt-1">📧 ${escapeHtml(ticket.email)}</p>` : ''}
                            </div>
                            <div class="flex flex-col gap-2">
                                <select onchange="updateTicketStatus(${ticket.id}, this.value)" class="bg-white/10 border border-white/20 rounded px-2 py-1 text-xs text-white">
                                    <option value="open" ${ticket.status === 'open' ? 'selected' : ''}>Открыть</option>
                                    <option value="in_progress" ${ticket.status === 'in_progress' ? 'selected' : ''}>В процессе</option>
                                    <option value="resolved" ${ticket.status === 'resolved' ? 'selected' : ''}>Решено</option>
                                    <option value="closed" ${ticket.status === 'closed' ? 'selected' : ''}>Закрыть</option>
                                </select>
                                <select onchange="updateTicketPriority(${ticket.id}, this.value)" class="bg-white/10 border border-white/20 rounded px-2 py-1 text-xs text-white">
                                    <option value="low" ${ticket.priority === 'low' ? 'selected' : ''}>Низкий</option>
                                    <option value="normal" ${ticket.priority === 'normal' ? 'selected' : ''}>Нормальный</option>
                                    <option value="high" ${ticket.priority === 'high' ? 'selected' : ''}>Высокий</option>
                                    <option value="urgent" ${ticket.priority === 'urgent' ? 'selected' : ''}>Срочный</option>
                                </select>
                                <button onclick="deleteTicket(${ticket.id})" class="text-red-400 hover:text-red-300 text-xs py-1">🗑 Удалить</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки тикетов:', error);
                container.innerHTML = `<div class="p-4 bg-white/5 rounded-lg text-center text-red-400">Ошибка соединения</div>`;
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'open': return 'bg-yellow-500/20 text-yellow-400';
                case 'in_progress': return 'bg-blue-500/20 text-blue-400';
                case 'resolved': return 'bg-green-500/20 text-green-400';
                case 'closed': return 'bg-gray-500/20 text-gray-400';
                default: return 'bg-gray-500/20 text-gray-400';
            }
        }

        function getStatusLabel(status) {
            switch(status) {
                case 'open': return 'Открыт';
                case 'in_progress': return 'В процессе';
                case 'resolved': return 'Решен';
                case 'closed': return 'Закрыт';
                default: return status;
            }
        }

        function getPriorityClass(priority) {
            switch(priority) {
                case 'low': return 'bg-gray-500/20 text-gray-400';
                case 'normal': return 'bg-blue-500/20 text-blue-400';
                case 'high': return 'bg-orange-500/20 text-orange-400';
                case 'urgent': return 'bg-red-500/20 text-red-400';
                default: return 'bg-gray-500/20 text-gray-400';
            }
        }

        function getPriorityLabel(priority) {
            switch(priority) {
                case 'low': return 'Низкий';
                case 'normal': return 'Нормальный';
                case 'high': return 'Высокий';
                case 'urgent': return 'Срочный';
                default: return priority;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU');
        }

        async function updateTicketStatus(id, status) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/tickets/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    loadTickets();
                } else {
                    alert('Ошибка при обновлении статуса');
                }
            } catch (error) {
                alert('Ошибка соединения');
            }
        }

        async function updateTicketPriority(id, priority) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/tickets/${id}/priority`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ priority })
                });

                if (response.ok) {
                    loadTickets();
                } else {
                    alert('Ошибка при обновлении приоритета');
                }
            } catch (error) {
                alert('Ошибка соединения');
            }
        }

        async function deleteTicket(id) {
            if (!confirm('Вы уверены, что хотите удалить этот тикет?')) return;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/tickets/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    loadTickets();
                } else {
                    alert('Ошибка при удалении тикета');
                }
            } catch (error) {
                alert('Ошибка соединения');
            }
        }

        // Placeholder functions for users and reports
        function loadUsers() {
            // Existing users loading logic should go here or in script.js
        }
        function loadReports() {
            // Existing reports loading logic should go here or in script.js
        }

        function checkAdminAccess() {
            const user = localStorage.getItem('user');
            const adminUserEl = document.getElementById('admin-user');
            if (user && adminUserEl) {
                try {
                    const userData = JSON.parse(user);
                    adminUserEl.textContent = `👑 ${userData.username}`;
                } catch (e) {
                    adminUserEl.textContent = '';
                }
            }
        }
    </script>
</body>

</html>
